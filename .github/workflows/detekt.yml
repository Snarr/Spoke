name: Static Analysis & Formatting

# Merge gate: runs spotless (formatting) and detekt (static analysis) on every pull
# request targeting main and on pushes to main. Unformatted code or any detekt finding
# fails the build, which blocks the PR when "Require status checks to pass" is enabled
# for main. The required check context is the job name ("detekt").

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  detekt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Check formatting (spotless)
        run: ./gradlew spotlessCheck

      - name: Run detekt
        run: ./gradlew detekt

      - name: Upload detekt report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: |
            build/reports/detekt/detekt.html
            build/reports/detekt/detekt.sarif
          if-no-files-found: ignore
