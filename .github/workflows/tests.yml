name: Unit Tests & Coverage

# Run tests on every pull request targeting main and on pushes to main
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  # Allow workflow to report test results
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            app/build/test-results/testDebugUnitTest/
            app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore

      - name: Publish test results
        if: ${{ always() }}
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: app/build/test-results/testDebugUnitTest/TEST-*.xml
          check_name: Unit Test Results
          comment_title: Test Results
          compare_to_earlier_commit: true

      - name: Comment PR with test summary
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const testResultsDir = 'app/build/test-results/testDebugUnitTest';
            
            if (!fs.existsSync(testResultsDir)) {
              console.log('No test results found');
              return;
            }
            
            let totalTests = 0;
            let totalFailures = 0;
            
            fs.readdirSync(testResultsDir).forEach(file => {
              if (file.startsWith('TEST-') && file.endsWith('.xml')) {
                const content = fs.readFileSync(path.join(testResultsDir, file), 'utf8');
                const testsMatch = content.match(/tests="(\d+)"/);
                const failuresMatch = content.match(/failures="(\d+)"/);
                
                if (testsMatch) totalTests += parseInt(testsMatch[1]);
                if (failuresMatch) totalFailures += parseInt(failuresMatch[1]);
              }
            });
            
            const status = totalFailures > 0 ? '❌' : '✅';
            const message = `${status} **Test Results**: ${totalTests} tests, ${totalFailures} failures`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
